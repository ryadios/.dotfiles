# Docs: https://wiki.hyprland.org/Configuring/Variables/#gestures

gestures {
    workspace_swipe_distance = 500
    workspace_swipe_cancel_ratio = 0.35
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 6
    workspace_swipe_create_new = true
}

gesture = 3, horizontal, workspace
gesture = 3, up, special, terminal
gesture = 3, down, dispatcher, togglespecialworkspace, terminal
gesture = 4, down, dispatcher, exec, systemctl suspend-then-hibernate
